<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surprise 10 — The Finale</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #f5c842;
  --gold-light: #ffe98a;
  --rose: #ff6b8a;
  --lavender: #c084fc;
  --sky: #60d0ff;
  --cream: #fff8ec;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #05050f;
  font-family: 'Lato', sans-serif;
}

/* ── NIGHT SKY ── */
#sky {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 100%, #1a0a2e 0%, #05050f 60%);
}

/* ── STARS ── */
.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  animation: twinkle var(--dur) infinite ease-in-out alternate;
}
@keyframes twinkle {
  from { opacity: 0.1; transform: scale(0.8); }
  to   { opacity: 1;   transform: scale(1.2); }
}

/* ── FIREWORK CANVAS ── */
#fw {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
}

/* ── CONFETTI CANVAS ── */
#cf {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
}

/* ── MAIN CONTENT ── */
#stage {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(12px, 3vh, 24px);
  padding: 20px;
}

/* ── CROWN ── */
#crown {
  font-size: clamp(40px, 12vw, 80px);
  opacity: 0;
  transform: translateY(-30px) scale(0.5);
  transition: all 0.8s cubic-bezier(.34,1.56,.64,1);
  filter: drop-shadow(0 0 18px var(--gold));
}
#crown.show { opacity: 1; transform: translateY(0) scale(1); }

/* ── HEADLINE ── */
#headline {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: clamp(36px, 11vw, 88px);
  line-height: 1.05;
  text-align: center;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--rose) 80%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 22px rgba(245,200,66,0.5));
  opacity: 0;
  transform: scale(0.85);
  transition: all 1s cubic-bezier(.34,1.56,.64,1) 0.4s;
  letter-spacing: -1px;
}
#headline.show { opacity: 1; transform: scale(1); }

/* ── SUBTITLE ── */
#sub {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(14px, 3.5vw, 22px);
  color: var(--cream);
  text-align: center;
  max-width: 420px;
  line-height: 1.7;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.9s ease 1.1s;
}
#sub.show { opacity: 1; transform: translateY(0); }

/* ── DIVIDER ── */
#divider {
  width: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  transition: width 1.2s ease 1.6s;
}
#divider.show { width: clamp(160px, 50vw, 300px); }

/* ── SIGN-OFF ── */
#signoff {
  font-size: clamp(13px, 3vw, 16px);
  color: rgba(255,255,255,0.55);
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 1s ease 2s;
}
#signoff.show { opacity: 1; }

/* ── EMOJI ROW ── */
#emojis {
  font-size: clamp(22px, 6vw, 36px);
  opacity: 0;
  transition: opacity 0.8s ease 2.4s;
  letter-spacing: 6px;
}
#emojis.show { opacity: 1; }

/* ── BACK BUTTON ── */
.back-btn {
  position: fixed;
  bottom: 20px; right: 20px;
  background: var(--gold);
  color: #1a0a2e;
  padding: 10px 20px;
  border-radius: 25px;
  font-weight: 700;
  text-decoration: none;
  font-size: 14px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.8s ease 3s;
  box-shadow: 0 4px 20px rgba(245,200,66,0.4);
}
.back-btn.show { opacity: 1; }
.back-btn:hover { background: var(--gold-light); }

/* ── FLOATING HEARTS ── */
.heart {
  position: fixed;
  font-size: 18px;
  pointer-events: none;
  z-index: 3;
  animation: floatHeart linear forwards;
  opacity: 0;
}
@keyframes floatHeart {
  0%   { opacity: 0; transform: translateY(0) scale(0.5) rotate(-10deg); }
  15%  { opacity: 1; }
  85%  { opacity: 0.8; }
  100% { opacity: 0; transform: translateY(-80vh) scale(1.2) rotate(10deg); }
}
</style>
</head>

<body>

<div id="sky"></div>
<canvas id="fw"></canvas>
<canvas id="cf"></canvas>


  <div id="headline">Once Again Wishing You A<br>Happy<br>Birthday Dii !</div>


</div>

<a href="homepage.html" class="back-btn" id="backBtn">BACK ◀</a>

<script>
/* ─── STARS ─── */
(function(){
  const sky = document.getElementById('sky');
  for(let i=0;i<120;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --dur:${(Math.random()*2+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    sky.appendChild(s);
  }
})();

/* ─── REVEAL SEQUENCE ─── */
window.addEventListener('load', () => {
  setTimeout(()=> document.getElementById('crown').classList.add('show'), 200);
  setTimeout(()=> document.getElementById('headline').classList.add('show'), 500);
  setTimeout(()=> document.getElementById('sub').classList.add('show'), 900);
  setTimeout(()=> document.getElementById('divider').classList.add('show'), 1500);
  setTimeout(()=> document.getElementById('signoff').classList.add('show'), 1900);
  setTimeout(()=> document.getElementById('emojis').classList.add('show'), 2300);
  setTimeout(()=> document.getElementById('backBtn').classList.add('show'), 2800);

  // start fireworks after a beat
  setTimeout(startFireworks, 800);
  setTimeout(startConfetti, 1200);
  setTimeout(startHearts, 2000);
});

/* ─── FIREWORKS ─── */
const fwCanvas = document.getElementById('fw');
const fwCtx = fwCanvas.getContext('2d');
let particles = [];

function resizeFW(){
  fwCanvas.width = window.innerWidth;
  fwCanvas.height = window.innerHeight;
}
resizeFW();
window.addEventListener('resize', resizeFW);

class Particle {
  constructor(x,y,color){
    this.x=x; this.y=y;
    this.color=color;
    const angle = Math.random()*Math.PI*2;
    const speed = Math.random()*5+2;
    this.vx = Math.cos(angle)*speed;
    this.vy = Math.sin(angle)*speed - 1.5;
    this.alpha=1;
    this.decay = Math.random()*0.015+0.012;
    this.r = Math.random()*2.5+1;
    this.trail = [];
  }
  update(){
    this.trail.push({x:this.x, y:this.y});
    if(this.trail.length>6) this.trail.shift();
    this.vy += 0.08;
    this.vx *= 0.98;
    this.x += this.vx; this.y += this.vy;
    this.alpha -= this.decay;
  }
  draw(ctx){
    // trail
    for(let i=0;i<this.trail.length;i++){
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.r*(i/this.trail.length)*0.7,0,Math.PI*2);
      ctx.fillStyle = this.color.replace('1)',`${(this.alpha*(i/this.trail.length)*0.4).toFixed(2)})`);
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle = this.color.replace('1)',`${this.alpha.toFixed(2)}`+')');
    ctx.fill();
  }
}

function explode(x,y){
  const palettes = [
    ['rgba(255,215,0,1)','rgba(255,180,50,1)','rgba(255,240,100,1)'],
    ['rgba(255,107,138,1)','rgba(255,160,180,1)','rgba(255,80,120,1)'],
    ['rgba(96,208,255,1)','rgba(150,230,255,1)','rgba(60,180,255,1)'],
    ['rgba(192,132,252,1)','rgba(220,170,255,1)','rgba(160,100,240,1)'],
    ['rgba(110,255,160,1)','rgba(80,220,130,1)','rgba(160,255,200,1)'],
  ];
  const pal = palettes[Math.floor(Math.random()*palettes.length)];
  for(let i=0;i<90;i++){
    particles.push(new Particle(x,y, pal[Math.floor(Math.random()*pal.length)]));
  }
}

let fwRunning = false;
function startFireworks(){
  fwRunning = true;
  fwLoop();
  // schedule bursts
  function burst(){
    if(!fwRunning) return;
    const x = window.innerWidth * (0.15 + Math.random()*0.7);
    const y = window.innerHeight * (0.1 + Math.random()*0.45);
    explode(x,y);
    setTimeout(burst, 500 + Math.random()*1200);
  }
  burst();
}

function fwLoop(){
  fwCtx.fillStyle = 'rgba(5,5,15,0.18)';
  fwCtx.fillRect(0,0,fwCanvas.width,fwCanvas.height);
  particles = particles.filter(p=>p.alpha>0.02);
  particles.forEach(p=>{ p.update(); p.draw(fwCtx); });
  requestAnimationFrame(fwLoop);
}

/* ─── CONFETTI ─── */
const cfCanvas = document.getElementById('cf');
const cfCtx = cfCanvas.getContext('2d');
let confettis = [];

function resizeCF(){
  cfCanvas.width = window.innerWidth;
  cfCanvas.height = window.innerHeight;
}
resizeCF();
window.addEventListener('resize', resizeCF);

class Confetto {
  constructor(){
    this.reset(true);
  }
  reset(init=false){
    this.x = Math.random()*cfCanvas.width;
    this.y = init ? Math.random()*cfCanvas.height : -20;
    this.w = Math.random()*10+5;
    this.h = Math.random()*5+3;
    this.angle = Math.random()*Math.PI*2;
    this.spin = (Math.random()-0.5)*0.18;
    this.vy = Math.random()*2+1;
    this.vx = (Math.random()-0.5)*1.2;
    const cols = ['#f5c842','#ff6b8a','#c084fc','#60d0ff','#ff9f5e','#7fffb0','#fff8ec'];
    this.color = cols[Math.floor(Math.random()*cols.length)];
    this.alpha = 0.85;
  }
  update(){
    this.y+=this.vy; this.x+=this.vx;
    this.angle+=this.spin;
    if(this.y>cfCanvas.height+20) this.reset();
  }
  draw(ctx){
    ctx.save();
    ctx.globalAlpha=this.alpha;
    ctx.translate(this.x,this.y);
    ctx.rotate(this.angle);
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.ellipse(0,0,this.w/2,this.h/2,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function startConfetti(){
  for(let i=0;i<120;i++) confettis.push(new Confetto());
  cfLoop();
}
function cfLoop(){
  cfCtx.clearRect(0,0,cfCanvas.width,cfCanvas.height);
  confettis.forEach(c=>{ c.update(); c.draw(cfCtx); });
  requestAnimationFrame(cfLoop);
}

/* ─── FLOATING HEARTS ─── */
const heartEmojis = ['💛','🌸','💕','✨','🎀','💖','🌟'];
function spawnHeart(){
  const h = document.createElement('div');
  h.className = 'heart';
  h.textContent = heartEmojis[Math.floor(Math.random()*heartEmojis.length)];
  h.style.left = (10+Math.random()*80)+'vw';
  h.style.bottom = '-40px';
  const dur = 5+Math.random()*4;
  h.style.animationDuration = dur+'s';
  h.style.animationDelay = '0s';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(), dur*1000);
}
function startHearts(){
  spawnHeart();
  setInterval(spawnHeart, 900);
}
</script>
</body>
</html>
