<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Surprise 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0a08;
  --gold: #c9a96e;
  --gold-light: #e8cc8a;
  --white: #fdfaf4;
  --rose: #c06878;
  --rose-soft: #e8899a;
}

html, body {
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  font-family: 'Crimson Pro', Georgia, serif;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  position: relative;
}

/* ── AMBIENT ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 25% 60%, rgba(201,169,110,0.07) 0%, transparent 55%),
    radial-gradient(ellipse at 75% 30%, rgba(192,104,120,0.06) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ── PARTICLES ── */
.particle {
  position: fixed;
  border-radius: 50%;
  background: var(--gold);
  pointer-events: none;
  z-index: 1;
  animation: drift linear infinite;
  opacity: 0;
}
@keyframes drift {
  0%   { transform: translateY(100vh); opacity: 0; }
  10%  { opacity: 0.3; }
  90%  { opacity: 0.07; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* ── WRAPPER ── */
.wrapper {
  position: relative;
  z-index: 2;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: max(48px, env(safe-area-inset-top)) 24px max(80px, env(safe-area-inset-bottom)) 24px;
}

/* ── CARD ── */
.card {
  width: 100%;
  max-width: 440px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(201,169,110,0.15);
  border-radius: 24px;
  padding: clamp(28px, 7vw, 48px) clamp(24px, 6vw, 40px);
  box-shadow:
    0 8px 40px rgba(0,0,0,0.4),
    0 0 0 1px rgba(255,255,255,0.03),
    inset 0 1px 0 rgba(255,255,255,0.06);
  position: relative;
  overflow: hidden;
}

/* subtle corner glow */
.card::before {
  content: '';
  position: absolute;
  top: -40px; left: -40px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(201,169,110,0.08), transparent 70%);
  pointer-events: none;
}

/* ── TOP LABEL ── */
.card-label {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0;
  animation: fadeIn 0.8s ease 0.3s forwards;
}
.card-label::before,
.card-label::after {
  content: '';
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent);
}

@keyframes fadeIn { to { opacity: 1; } }

/* ── LINES CONTAINER ── */
#lineContainer {
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-height: 60px;
}

/* ── INDIVIDUAL LINE ── */
.line {
  opacity: 0;
  transform: translateY(14px);
  animation: lineIn 0.6s cubic-bezier(.22,1,.36,1) forwards;
  line-height: 1.7;
  font-weight: 300;
}

@keyframes lineIn {
  to { opacity: 1; transform: translateY(0); }
}

/* FIRST LINE — title */
.line-0 {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: clamp(22px, 6vw, 28px);
  color: var(--gold-light);
  text-align: center;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(201,169,110,0.15);
  font-weight: 400;
  letter-spacing: -0.3px;
}

/* BODY LINES */
.line-1, .line-2, .line-3 {
  font-size: clamp(15px, 4vw, 18px);
  color: rgba(255,255,255,0.7);
  padding-left: 16px;
  border-left: 2px solid rgba(201,169,110,0.25);
  transition: border-color 0.4s ease;
}

.line-1:hover, .line-2:hover, .line-3:hover {
  border-left-color: var(--gold);
  color: rgba(255,255,255,0.9);
}

/* last line — special */
.line-3 {
  color: rgba(255,255,255,0.85);
  border-left-color: rgba(192,104,120,0.4);
  font-style: italic;
}

/* ── TAP HINT ── */
#hint {
  margin-top: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  opacity: 0;
  animation: fadeIn 0.8s ease 0.8s forwards;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.hint-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.5;
  animation: dotPulse 1.3s infinite ease-in-out;
}
.hint-dot:nth-child(2) { animation-delay: 0.2s; }
.hint-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%,80%,100% { transform: scale(0.8); opacity: 0.3; }
  40%          { transform: scale(1.3); opacity: 0.8; }
}

.hint-text {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: rgba(201,169,110,0.5);
}

/* ── CLOSING ORNAMENT ── */
#closing {
  margin-top: 28px;
  text-align: center;
  display: none;
  animation: fadeIn 0.8s ease forwards;
}

.closing-line {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.3), transparent);
  margin-bottom: 16px;
}

.closing-sig {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 14px;
  color: rgba(201,169,110,0.5);
  letter-spacing: 1px;
}

/* ── BACK BUTTON ── */
.back-btn {
  position: fixed;
  bottom: max(20px, env(safe-area-inset-bottom));
  right: 20px;
  background: linear-gradient(135deg, #e8899a, #f0b080);
  padding: 11px 22px;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  font-weight: 400;
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(232,137,154,0.3);
  font-family: 'Crimson Pro', serif;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease, transform 0.2s ease, box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.back-btn.show {
  opacity: 1;
  pointer-events: auto;
}
.back-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(232,137,154,0.45);
}
</style>
</head>
<body>

<div id="particles"></div>

<div class="wrapper">
  <div class="card">
    <div class="card-label">a little something for you</div>
    <div id="lineContainer"></div>
    <div id="hint">
      <div class="hint-dot"></div>
      <div class="hint-dot"></div>
      <div class="hint-dot"></div>
      <span class="hint-text">tap to read</span>
    </div>
    <div id="closing">
      <div class="closing-line"></div>
      <div class="closing-sig">with love, always 🤍</div>
    </div>
  </div>
</div>

<a href="index.html" id="backBtn" class="back-btn">BACK ◀</a>

<script>
const lines = [
  "❤️ Adiye Vaisiyaa ❤️",
  "I can't wait to make more memories as we grow closer with time",
  "From this year on, I better see some effort… you texting and calling first 😌",
  "Looking forward to more endless laughter and a lifetime of an unbreakable bond."
];

let current = 0;
let done = false;

function showNext() {
  if (done) return;
  if (current < lines.length) {
    const container = document.getElementById('lineContainer');
    const div = document.createElement('div');
    div.classList.add('line', 'line-' + current);
    div.style.animationDelay = '0s';
    div.textContent = lines[current];
    container.appendChild(div);
    current++;

    if (current === lines.length) {
      done = true;
      document.getElementById('hint').style.display = 'none';
      document.getElementById('closing').style.display = 'block';
      document.getElementById('backBtn').classList.add('show');
    }
  }
}

document.addEventListener('click', e => {
  if (e.target.closest('.back-btn')) return;
  showNext();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') showNext();
});

/* PARTICLES */
const pc = document.getElementById('particles');
for (let i = 0; i < 18; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const sz = Math.random() * 2 + 1;
  p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}vw;animation-duration:${14+Math.random()*10}s;animation-delay:${Math.random()*10}s;`;
  pc.appendChild(p);
}

/* auto show first line */
window.onload = () => setTimeout(showNext, 600);
</script>

</body>
</html>
